# Test configuration — COMMITTED (unlike src/main/resources/application.properties,
# which is gitignored and therefore absent in CI).
#
# A test-scoped application.properties on the classpath shadows the main one
# during tests, so this file must be self-contained. Values default to local-dev
# settings but can be overridden by environment variables (e.g. the Postgres
# service container in CI supplies SPRING_DATASOURCE_URL pointing at port 5432).

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# The missing piece: create the schema for the @SpringBootTest context load.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jackson.date-format=MM/dd/yyyy hh:mm a
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Required so JwtUtil's @Value placeholders resolve during context load.
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGRldmVsb3BtZW50IHB1cnBvc2VzIG9ubHk=}
jwt.expiration=${JWT_EXPIRATION:86400000}
