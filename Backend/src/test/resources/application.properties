# Test configuration — COMMITTED (unlike src/main/resources/application.properties,
# which is gitignored and therefore absent in CI).
#
# A test-scoped application.properties on the classpath shadows the main one
# during tests, so this file must be self-contained. The datasource is NOT set
# here: Testcontainers starts a real Postgres and @ServiceConnection (see
# ServiceLinkApplicationTests) supplies the URL/username/password at runtime.

# Activates the "test" profile so beans marked @Profile("!test") (e.g. Seeder)
# are excluded during tests.
spring.profiles.active=test

# Create the schema against the Testcontainers Postgres for the context load.
spring.jpa.hibernate.ddl-auto=create-drop

spring.jackson.date-format=MM/dd/yyyy hh:mm a
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# Required so JwtUtil's @Value placeholders resolve during context load.
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHNlY3JldCBrZXkgZm9yIGRldmVsb3BtZW50IHB1cnBvc2VzIG9ubHk=}
jwt.expiration=${JWT_EXPIRATION:86400000}
