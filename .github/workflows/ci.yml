name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # The Maven project lives in the Backend/ subfolder of the repo.
    defaults:
      run:
        working-directory: Backend

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make the Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test
        run: ./mvnw -B --no-transfer-progress verify