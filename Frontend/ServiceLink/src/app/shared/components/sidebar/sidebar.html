<div class="flex flex-col h-full w-64 bg-gray-800 px-4 py-6">

  <!-- Logo -->
  <h1 class="text-xl font-bold text-indigo-400 mb-8 px-2">ServiceLink</h1>

  <!-- Nav Links -->
  <nav class="flex flex-col gap-1 flex-1">
    <a routerLink="/dashboard" routerLinkActive="bg-gray-700 text-white"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors text-sm">
      Dashboard
    </a>

    <a routerLink="/tickets" routerLinkActive="bg-gray-700 text-white"
       class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors text-sm">
      Tickets
    </a>

    @if (role === 'ADMIN') {
      <a routerLink="/admin/users" routerLinkActive="bg-gray-700 text-white"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white transition-colors text-sm">
        User Management
      </a>
    }
  </nav>

  <!-- User Info & Logout -->
  <div class="border-t border-gray-700 pt-4">
    <p class="text-xs text-gray-400 px-2 mb-2">{{ role }}</p>
    <button (click)="logout()"
            class="w-full text-left px-3 py-2 text-sm text-gray-400 hover:bg-gray-700 hover:text-white rounded-lg transition-colors">
      Logout
    </button>
  </div>
</div>
